<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考志愿填报App · 交互原型 Overview</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #F5F5F0;
    color: #262626;
    -webkit-font-smoothing: antialiased;
  }
  .page-header {
    text-align: center;
    padding: 48px 24px 32px;
    background: linear-gradient(135deg, #FFF9F5 0%, #FFF2E8 100%);
  }
  .page-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: #262626;
    letter-spacing: -0.5px;
  }
  .page-header .subtitle {
    font-size: 15px;
    color: #8C8C8C;
    margin-top: 8px;
  }
  .design-system-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 20px 24px;
    background: #fff;
    border-bottom: 1px solid #F0F0F0;
    flex-wrap: wrap;
  }
  .ds-group { display:flex; align-items:center; gap:8px; }
  .ds-label { font-size:12px; color:#8C8C8C; font-weight:500; }
  .ds-swatch {
    width:24px; height:24px; border-radius:6px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .screens-container {
    display: flex;
    flex-wrap: wrap;
    gap: 48px;
    padding: 48px;
    justify-content: center;
  }
  .screen-block {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .screen-label {
    font-size: 14px;
    font-weight: 600;
    color: #262626;
    margin-bottom: 4px;
  }
  .screen-sublabel {
    font-size: 12px;
    color: #8C8C8C;
    margin-bottom: 16px;
  }
  .review-note {
    width: 393px;
    margin-top: 20px;
    padding: 16px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #F0F0F0;
    font-size: 12px;
    line-height: 1.7;
    color: #595959;
  }
  .review-note .rn-title {
    font-size: 13px;
    font-weight: 600;
    color: #262626;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .review-note .rn-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
    margin-right: 4px;
  }
  .rn-tag-opt { background:#E6F7FF; color:#1890FF; }
  .rn-tag-issue { background:#FFF1F0; color:#FF4D4F; }
  .rn-tag-good { background:#F6FFED; color:#52C41A; }

<body>
<div id="root"></div>

<script type="text/babel">
// ============================================================
// iOS Frame Component (from huashu-design assets/ios_frame.jsx)
// ============================================================
const iosFrameStyles = {
  wrapper: {
    display: 'inline-block', padding: 12, background: '#000',
    borderRadius: 60, boxShadow: '0 0 0 2px #1f2937, 0 20px 60px rgba(0,0,0,0.3)',
    position: 'relative',
  },
  screen: {
    position: 'relative', borderRadius: 48, overflow: 'hidden', background: '#fff',
  },
  statusBar: {
    position: 'absolute', top: 0, left: 0, right: 0, height: 54,
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 32px 0 32px', fontSize: 16, fontWeight: 600,
    fontFamily: '-apple-system, "SF Pro Text", sans-serif', zIndex: 20, pointerEvents: 'none',
  },
  dynamicIsland: {
    position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)',
    width: 124, height: 36, background: '#000', borderRadius: 999, zIndex: 30,
  },
  statusIcons: { display: 'flex', alignItems: 'center', gap: 6 },
  signalIcon: { display: 'flex', alignItems: 'flex-end', gap: 2, height: 12 },
  signalBar: { width: 3, background: 'currentColor', borderRadius: 1 },
  batteryIcon: {
    width: 26, height: 12, border: '1.5px solid currentColor', borderRadius: 3,
    padding: 1, position: 'relative', opacity: 0.8,
  },
  batteryCap: {
    position: 'absolute', top: 3, right: -3, width: 2, height: 6,
    background: 'currentColor', borderRadius: '0 1px 1px 0',
  },
  content: {
    position: 'absolute', top: 54, left: 0, right: 0, bottom: 34, overflow: 'auto',
  },
  homeIndicator: {
    position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)',
    width: 140, height: 5, background: 'rgba(0,0,0,0.3)', borderRadius: 999, zIndex: 10,
  },
};

function IosFrame({ children, width = 393, height = 852, time = '9:41', battery = 100, darkMode = false }) {
  const textColor = darkMode ? '#fff' : '#000';
  return (
    <div style={iosFrameStyles.wrapper}>
      <div style={{ ...iosFrameStyles.screen, width, height, background: darkMode ? '#000' : '#fff' }}>
        <div style={{ ...iosFrameStyles.statusBar, color: textColor }}>
          <span>{time}</span>
          <div style={iosFrameStyles.statusIcons}>
            <div style={iosFrameStyles.signalIcon}>
              <div style={{ ...iosFrameStyles.signalBar, height: 4 }} />
              <div style={{ ...iosFrameStyles.signalBar, height: 6 }} />
              <div style={{ ...iosFrameStyles.signalBar, height: 9 }} />
              <div style={{ ...iosFrameStyles.signalBar, height: 11 }} />
            </div>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none" style={{ color: textColor }}>
              <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor" />
              <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" />
              <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" opacity="0.7" />
            </svg>
            <div style={iosFrameStyles.batteryIcon}>
              <div style={{ width: `${battery}%`, height: '100%', background: 'currentColor', borderRadius: 1, opacity: 0.9 }} />
              <div style={iosFrameStyles.batteryCap} />
            </div>
          </div>
        </div>
        <div style={iosFrameStyles.dynamicIsland} />
        <div style={iosFrameStyles.content}>{children}</div>
        <div style={iosFrameStyles.homeIndicator} />
      </div>
    </div>
  );
}

// ============================================================
// Design Tokens & Shared Components
// ============================================================
const C = {
  primary: '#FF7A45',
  primaryLight: '#FFF2E8',
  primaryDark: '#D4380D',
  gold: '#FAAD14',
  goldLight: '#FFFBE6',
  green: '#52C41A',
  greenLight: '#F6FFED',
  greenDark: '#389E0D',
  blue: '#1890FF',
  blueLight: '#E6F7FF',
  red: '#FF4D4F',
  redLight: '#FFF1F0',
  teal: '#08979C',
  tealLight: '#E6FFFB',
  bg: '#FFF9F5',
  surface: '#FFFFFF',
  text1: '#262626',
  text2: '#8C8C8C',
  text3: '#BFBFBF',
  border: '#F0F0F0',
  divider: '#F5F5F5',
  // Tier colors
  rush: '#FF6B35',
  rushBg: '#FFF3ED',
  stable: '#FAAD14',
  stableBg: '#FFFBE6',
  preserve: '#52C41A',
  preserveBg: '#F6FFED',
  cushion: '#08979C',
  cushionBg: '#E6FFFB',
};

const S = {
  screen: { width: '100%', height: '100%', background: C.bg, overflow: 'hidden', position: 'relative' },
  pad: { padding: '0 20px' },
  title: { fontSize: 22, fontWeight: 700, color: C.text1, letterSpacing: -0.3 },
  subtitle: { fontSize: 14, color: C.text2, marginTop: 4 },
  card: { background: C.surface, borderRadius: 16, padding: 16, marginTop: 12 },
  label: { fontSize: 14, fontWeight: 600, color: C.text1, marginBottom: 8 },
  input: {
    width: '100%', height: 48, border: `1.5px solid ${C.border}`, borderRadius: 12,
    padding: '0 16px', fontSize: 16, color: C.text1, background: C.surface,
    outline: 'none',
  },
  btnPrimary: {
    width: '100%', height: 52, background: `linear-gradient(135deg, ${C.primary} 0%, #FF9C6E 100%)`,
    color: '#fff', fontSize: 17, fontWeight: 600, border: 'none', borderRadius: 26,
    cursor: 'pointer', boxShadow: `0 4px 16px ${C.primary}40`,
  },
  btnGhost: {
    width: '100%', height: 48, background: 'transparent', color: C.text2,
    fontSize: 15, border: `1.5px solid ${C.border}`, borderRadius: 24, cursor: 'pointer',
  },
  hint: { fontSize: 13, color: C.primary, textAlign: 'center', marginTop: 12, fontWeight: 500 },
  tag: {
    display: 'inline-flex', alignItems: 'center', gap: 4, fontSize: 11,
    padding: '3px 8px', borderRadius: 6, fontWeight: 500,
  },
};

// Progress Bar Component
function ProgressBar({ step, total }) {
  const pct = (step / total) * 100;
  return (
    <div style={{ padding: '12px 20px 0' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: C.text2, fontWeight: 500 }}>
          第{step}步/共{total}步
        </span>
        <span style={{ fontSize: 12, color: C.primary, fontWeight: 600 }}>{Math.round(pct)}%</span>
      </div>
      <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: 'hidden' }}>
        <div style={{
          height: '100%', width: `${pct}%`,
          background: `linear-gradient(90deg, ${C.primary} 0%, ${C.gold} 100%)`,
          borderRadius: 3, transition: 'width 0.3s',
        }} />
      </div>
    </div>
  );
}

// Navigation Bar
function NavBar({ title, showBack }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      padding: '8px 20px 4px', height: 44,
    }}>
      {showBack ? (
        <div style={{ width: 32, fontSize: 20, color: C.text1, cursor: 'pointer' }}>‹</div>
      ) : <div style={{ width: 32 }} />}
      <span style={{ fontSize: 16, fontWeight: 600, color: C.text1 }}>{title}</span>
      <div style={{ width: 32 }} />
    </div>
  );
}

// ============================================================
// Screen 1: 首页/启动页
// ============================================================

    <div style={{ ...S.screen, background: `linear-gradient(180deg, ${C.primaryLight} 0%, ${C.bg} 40%)` }}>
      {/* Hero Section */}
      <div style={{

        {/* Sun illustration */}

          boxShadow: `0 8px 32px ${C.gold}60`,

        }}>

          {[0, 45, 90, 135, 180, 225, 270, 315].map(deg => (

        </p>
      </div>

      {/* Trust Cards */}
      <div style={{ padding: '24px 20px' }}>
        <div style={{ display: 'flex', gap: 10 }}>

            { icon: '🛡', title: '规则引擎', desc: '防幻觉校验' },

        <p style={{ fontSize: 12, color: C.text3, textAlign: 'center', marginTop: 10 }}>

        </p>
      </div>
    </div>

}

// ============================================================
// Screen 2: Step 1 基础信息
// ============================================================

// ============================================================
// Screen 3: Step 2 选科组合 (3+1+2 mode)
// ============================================================
function ScreenStep2() {
  const subjects = [
    { name: '物理', icon: '⚡', selected: true, type: 'first' },
    { name: '历史', icon: '📖', selected: false, type: 'first' },
  ];
  const secondSubjects = [
    { name: '化学', selected: true },
    { name: '生物', selected: true },
    { name: '地理', selected: false },
    { name: '政治', selected: false },
  ];

  return (
    <div style={S.screen}>
      <ProgressBar step={2} total={4} />
      <div style={{ ...S.pad, marginTop: 16 }}>
        <h2 style={S.title}>选择你的选科组合</h2>

      <div style={{ ...S.pad, marginTop: 20 }}>
        <div style={{ ...S.label, display: 'flex', justifyContent: 'space-between' }}>
          <span>首选科目 <span style={{ color: C.red }}>*</span></span>
          <span style={{ fontSize: 12, color: C.text2, fontWeight: 400 }}>2选1</span>

        <div style={{ display: 'flex', gap: 12 }}>

              flex: 1, height: 72, borderRadius: 14, padding: 12,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4,
              cursor: 'pointer',
              border: s.selected ? `2px solid ${C.primary}` : `1.5px solid ${C.border}`,
              background: s.selected ? C.primaryLight : C.surface,
            }}>
              <span style={{ fontSize: 24 }}>{s.icon}</span>
              <span style={{
                fontSize: 15, fontWeight: 600,
                color: s.selected ? C.primaryDark : C.text1,
