services:
  postgres:
    image: postgres:16-alpine
    container_name: gaokao-postgres
    environment:
      POSTGRES_USER: gaokao
      POSTGRES_PASSWORD: gaokao123
      POSTGRES_DB: gaokao_db
    ports:
      - "5432:5432"
    volumes:
      - gaokao_pg_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaokao -d gaokao_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gaokao_pg_data:
