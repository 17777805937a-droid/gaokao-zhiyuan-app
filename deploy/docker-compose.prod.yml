# 生产环境部署（腾讯云 CVM / 轻量应用服务器 / TKE 节点通用）
# 用法：
#   1) 在本机/CI 构建前端：npm install && npm run build   （生成 ../dist）
#   2) 复制本目录到服务器，重命名 .env.prod.example 为 .env.prod 并填入真实值
#   3) docker compose -f docker-compose.prod.yml up -d --build
#
# 说明：
#   - 数据库默认使用腾讯云数据库 PostgreSQL（TencentDB for PostgreSQL），
#     连接串在 .env.prod 的 DATABASE_URL 中配置。
#   - 如需在容器内自托管 PostgreSQL（不推荐生产），取消下方 db 服务注释，
#     并把 api 的 depends_on 与 DATABASE_URL 改回 db 容器地址。

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: gaokao-api:latest
    container_name: gaokao-api
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - PORT=8080
    expose:
      - "8080"
    restart: unless-stopped
    # 若启用本地 db 服务，取消下一行注释
    # depends_on:
    #   db:
    #     condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: gaokao-web
    ports:
      - "80:80"
      # 如需 HTTPS，先放证书再改 nginx.conf 监听 443，并在此映射 "443:443"
    volumes:
      - ../dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  # ===== 可选：本地 PostgreSQL（生产建议用 TencentDB for PostgreSQL）=====
